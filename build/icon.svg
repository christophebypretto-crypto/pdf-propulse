<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C806E"/>
      <stop offset="100%" stop-color="#0A6B5B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond carré arrondi (style icône macOS Big Sur) -->
  <rect x="64" y="64" width="896" height="896" rx="200" ry="200" fill="url(#bg)"/>

  <!-- Page de PDF stylisée (rectangle blanc avec coin replié) -->
  <g filter="url(#shadow)">
    <path d="M 280 240
             L 660 240
             L 760 340
             L 760 800
             Q 760 840 720 840
             L 280 840
             Q 240 840 240 800
             L 240 280
             Q 240 240 280 240 Z"
          fill="#FAF6F2"/>
    <!-- Coin replié -->
    <path d="M 660 240 L 660 320 Q 660 340 680 340 L 760 340 Z"
          fill="#E5DCD0"/>
  </g>

  <!-- PDF en gros, vert Pretto -->
  <text x="500" y="500" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-weight="900" font-size="160" fill="#0C806E"
        letter-spacing="-4">PDF</text>

  <!-- 100K en olive en dessous -->
  <text x="500" y="640" text-anchor="middle"
        font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="120" fill="#98AF24"
        letter-spacing="-2">100K</text>

  <!-- Petites lignes décoratives sous le 100K -->
  <rect x="320" y="700" width="360" height="14" rx="7" fill="#0C806E" opacity="0.18"/>
  <rect x="360" y="740" width="280" height="14" rx="7" fill="#0C806E" opacity="0.12"/>
</svg>
