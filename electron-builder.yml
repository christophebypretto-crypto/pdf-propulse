appId: fr.bypretto.pdf100k
productName: PDF 100K
copyright: Copyright © 2026 Christophe Goubet
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
fileAssociations:
  - ext: pdf
    name: PDF Document
    description: Document PDF — éditable avec PDF 100K
    role: Editor
    rank: Alternate
    icon: build/icon.icns
    mimeType: application/pdf
publish:
  - provider: github
    owner: christophebypretto-crypto
    repo: pdf-100k
    private: true
    releaseType: release
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: "PDF-100K-${version}-${arch}.${ext}"
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  artifactName: "PDF-100K-${version}-${arch}.${ext}"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
  artifactName: "PDF-100K-${version}-Setup.${ext}"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "PDF-100K-${version}-Setup.${ext}"
  shortcutName: PDF 100K
linux:
  target:
    - AppImage
  category: Office
  artifactName: "PDF-100K-${version}.${ext}"
